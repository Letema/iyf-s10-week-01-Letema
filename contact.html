<h1>Contact Me</h1>

<form>

    <fieldset>
        <legend>Personal Information</legend>

        <label for="name">Full Name *</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        <br><br>

        <label for="email">Email *</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br><br>

        <label for="phone">Phone (optional)</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
        <br><br>

    </fieldset>

    <br>

    <fieldset>
        <legend>Message Details</legend>

        <label for="subject">Subject *</label><br>
        <select id="subject" name="subject" required>
            <option value="">-- Select Subject --</option>
            <option value="project">Project Inquiry</option>
            <option value="job">Job Opportunity</option>
            <option value="general">General Question</option>
        </select>

        <br><br>

        <label for="message">Message *</label><br>
        <textarea id="message" name="message" rows="5" placeholder="Write your message here (minimum 50 characters)" minlength="50" required></textarea>

        <br><br>

        <label>
            <input type="checkbox" name="newsletter">
            Subscribe to newsletter
        </label>

    </fieldset>

    <br>

    <button type="submit">Send Message</button>

</form>

<hr>

<h2>Other Contact Info</h2>
<p>Email: letema@example.com</p>
<p>Location: Kenya</p>

</body>
</html>
